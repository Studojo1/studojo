name: Deploy to Kubernetes

on:
  push:
    branches:
      - master
      - main

env:
  ACR_NAME: acrstudojo
  ACR_REGISTRY: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io
  KUBERNETES_NAMESPACE: studojo
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_NAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./apps/frontend
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/frontend:latest
          build-args: |
            VITE_CONTROL_PLANE_URL=https://api.studojo.com

      - name: Build and push Admin Panel
        uses: docker/build-push-action@v5
        with:
          context: ./apps/admin-panel
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/admin-panel:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/admin-panel:latest
          build-args: |
            VITE_CONTROL_PLANE_URL=https://api.studojo.com

      - name: Build and push Dev Panel
        uses: docker/build-push-action@v5
        with:
          context: ./apps/dev-panel
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/dev-panel:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/dev-panel:latest

      - name: Build and push Maverick
        uses: docker/build-push-action@v5
        with:
          context: ./apps/maverick
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/maverick:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/maverick:latest

      - name: Build and push Partner Panel
        uses: docker/build-push-action@v5
        with:
          context: ./apps/partner-panel
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/partner-panel:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/partner-panel:latest

      - name: Build and push Control Plane
        uses: docker/build-push-action@v5
        with:
          context: ./services/control-plane
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/control-plane:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/control-plane:latest

      - name: Build and push Resume Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/resume-svc
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/resume-service:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/resume-service:latest

      - name: Build and push Resume Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/resume-worker
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/resume-worker:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/resume-worker:latest

      - name: Build and push Assignment Gen Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/assignment-gen-worker
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/assignment-gen-worker:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/assignment-gen-worker:latest

      - name: Build and push Humanizer Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/humanizer-svc
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/humanizer-svc:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/humanizer-svc:latest

      - name: Build and push Humanizer Worker
        uses: docker/build-push-action@v5
        with:
          context: ./services/humanizer-worker
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/humanizer-worker:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/humanizer-worker:latest

      - name: Build and push Emailer Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/emailer-service
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/emailer-service:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/emailer-service:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true
      
      - name: Azure Login (Alternative - using individual secrets)
        if: failure() && secrets.AZURE_CLIENT_ID != ''
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Set up kubelogin
        uses: azure/kubelogin@v1
        with:
          kubelogin-version: 'v0.0.32'

      - name: Configure kubectl
        run: |
          az aks get-credentials --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} --name ${{ secrets.AKS_CLUSTER_NAME }} --overwrite-existing

      - name: Update image tags in deployments
        run: |
          find k8s -name "*.yaml" -type f -exec sed -i "s|image:.*:latest|image: ${{ env.ACR_REGISTRY }}/&|g" {} \;
          find k8s -name "deployment.yaml" -type f -exec sed -i "s|image: ${{ env.ACR_REGISTRY }}/\(.*\):latest|image: ${{ env.ACR_REGISTRY }}/\1:${{ env.IMAGE_TAG }}|g" {} \;

      - name: Apply Kubernetes manifests
        run: |
          cd k8s
          kubectl apply -f namespace.yaml || true
          kubectl apply -f configmaps/ || true
          kubectl apply -f secrets/ || true
          kubectl apply -f control-plane/
          kubectl apply -f frontend/
          kubectl apply -f admin-panel/
          kubectl apply -f dev-panel/
          kubectl apply -f maverick/
          kubectl apply -f partner-panel/
          kubectl apply -f resume-service/
          kubectl apply -f resume-worker/
          kubectl apply -f assignment-gen-worker/
          kubectl apply -f humanizer-svc/
          kubectl apply -f humanizer-worker/
          kubectl apply -f emailer-service/
          kubectl apply -f ingress/

      - name: Wait for deployments to be ready
        run: |
          kubectl rollout status deployment/control-plane -n ${{ env.KUBERNETES_NAMESPACE }} --timeout=5m || true
          kubectl rollout status deployment/frontend -n ${{ env.KUBERNETES_NAMESPACE }} --timeout=5m || true
          kubectl rollout status deployment/admin-panel -n ${{ env.KUBERNETES_NAMESPACE }} --timeout=5m || true
          kubectl rollout status deployment/dev-panel -n ${{ env.KUBERNETES_NAMESPACE }} --timeout=5m || true
          kubectl rollout status deployment/maverick -n ${{ env.KUBERNETES_NAMESPACE }} --timeout=5m || true

      - name: Record deployment in Control Plane
        run: |
          CONTROL_PLANE_URL="https://api.studojo.com"
          TOKEN="${{ secrets.CONTROL_PLANE_API_TOKEN }}"
          
          SERVICES=("frontend" "admin-panel" "dev-panel" "maverick" "partner-panel" "control-plane" "resume-service" "resume-worker" "assignment-gen-worker" "humanizer-svc" "humanizer-worker" "emailer-service")
          
          for service in "${SERVICES[@]}"; do
            curl -X POST "$CONTROL_PLANE_URL/v1/dev/deployments" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"service\": \"$service\",
                \"version\": \"${{ env.IMAGE_TAG }}\",
                \"deployed_by\": \"${{ github.actor }}\",
                \"status\": \"success\",
                \"workflow_run\": ${{ github.run_id }}
              }" || echo "Failed to record deployment for $service"
          done

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Workflow Run**: ${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Services Deployed" >> $GITHUB_STEP_SUMMARY
          echo "- frontend" >> $GITHUB_STEP_SUMMARY
          echo "- admin-panel" >> $GITHUB_STEP_SUMMARY
          echo "- dev-panel" >> $GITHUB_STEP_SUMMARY
          echo "- maverick" >> $GITHUB_STEP_SUMMARY
          echo "- partner-panel" >> $GITHUB_STEP_SUMMARY
          echo "- control-plane" >> $GITHUB_STEP_SUMMARY
          echo "- resume-service" >> $GITHUB_STEP_SUMMARY
          echo "- resume-worker" >> $GITHUB_STEP_SUMMARY
          echo "- assignment-gen-worker" >> $GITHUB_STEP_SUMMARY
          echo "- humanizer-svc" >> $GITHUB_STEP_SUMMARY
          echo "- humanizer-worker" >> $GITHUB_STEP_SUMMARY
          echo "- emailer-service" >> $GITHUB_STEP_SUMMARY

