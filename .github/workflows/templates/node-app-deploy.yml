name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io
  APP_NAME: ${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.REGISTRY }}/${{ env.APP_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.APP_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.APP_NAME }}:buildcache,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/${{ env.APP_NAME }} ${{ env.APP_NAME }}=${{ env.REGISTRY }}/${{ env.APP_NAME }}:${{ env.IMAGE_TAG }} -n studojo
          kubectl rollout status deployment/${{ env.APP_NAME }} -n studojo --timeout=5m

      - name: Record deployment
        run: |
          curl -X POST https://api.studojo.com/v1/dev/deployments \
            -H "Content-Type: application/json" \
            -d '{
              "service": "${{ env.APP_NAME }}",
              "version": "${{ env.IMAGE_TAG }}",
              "deployed_at": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
              "deployed_by": "${{ github.actor }}",
              "status": "success",
              "workflow_run": ${{ github.run_id }}
            }' || echo "Failed to record deployment (non-critical)"

