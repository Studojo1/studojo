name: Build and Push to ACR

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/build-and-push.yml'

env:
  AZURE_RESOURCE_GROUP: studojo-rg
  ACR_NAME: acrstudojo
  # Control plane URL for frontend build (set in GitHub Secrets)
  # Default: https://api.studojo.com
  VITE_CONTROL_PLANE_URL: ${{ secrets.VITE_CONTROL_PLANE_URL || 'https://api.studojo.com' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC authentication

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Control Plane
        if: contains(github.event.head_commit.message, 'services/control-plane') || contains(github.event.head_commit.modified, 'services/control-plane') || contains(github.event.head_commit.added, 'services/control-plane') || github.event.head_commit.message == '' || contains(github.event.head_commit.modified, 'services/')
        uses: docker/build-push-action@v5
        with:
          context: ./services/control-plane
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/control-plane:latest,${{ env.ACR_NAME }}.azurecr.io/control-plane:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/control-plane:latest
          cache-to: type=inline

      - name: Build and push Resume Service
        if: contains(github.event.head_commit.message, 'services/resume-svc') || contains(github.event.head_commit.modified, 'services/resume-svc') || contains(github.event.head_commit.added, 'services/resume-svc') || github.event.head_commit.message == '' || contains(github.event.head_commit.modified, 'services/')
        uses: docker/build-push-action@v5
        with:
          context: ./services/resume-svc
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/resume-service:latest,${{ env.ACR_NAME }}.azurecr.io/resume-service:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/resume-service:latest
          cache-to: type=inline

      - name: Build and push Assignment Gen Worker
        if: contains(github.event.head_commit.message, 'services/assignment-gen-worker') || contains(github.event.head_commit.modified, 'services/assignment-gen-worker') || contains(github.event.head_commit.added, 'services/assignment-gen-worker') || github.event.head_commit.message == '' || contains(github.event.head_commit.modified, 'services/')
        uses: docker/build-push-action@v5
        with:
          context: ./services/assignment-gen-worker
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/assignment-gen-worker:latest,${{ env.ACR_NAME }}.azurecr.io/assignment-gen-worker:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/assignment-gen-worker:latest
          cache-to: type=inline

      - name: Build and push Resume Worker
        if: contains(github.event.head_commit.modified, 'services/resume-worker') || contains(github.event.head_commit.added, 'services/resume-worker') || github.event.head_commit.message == '' || contains(github.event.head_commit.modified, 'services/')
        uses: docker/build-push-action@v5
        with:
          context: ./services/resume-worker
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/resume-worker:latest,${{ env.ACR_NAME }}.azurecr.io/resume-worker:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/resume-worker:latest
          cache-to: type=inline

      - name: Build and push Frontend
        if: contains(github.event.head_commit.modified, 'frontend/') || contains(github.event.head_commit.added, 'frontend/') || github.event.head_commit.message == ''
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.ACR_NAME }}.azurecr.io/frontend:latest,${{ env.ACR_NAME }}.azurecr.io/frontend:${{ github.sha }}
          build-args: |
            VITE_CONTROL_PLANE_URL=${{ env.VITE_CONTROL_PLANE_URL }}
          cache-from: type=registry,ref=${{ env.ACR_NAME }}.azurecr.io/frontend:latest
          cache-to: type=inline

