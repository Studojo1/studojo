apiVersion: apps/v1
kind: Deployment
metadata:
  name: dev-panel
  namespace: studojo
  labels:
    app: dev-panel
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: dev-panel
  template:
    metadata:
      labels:
        app: dev-panel
        version: latest
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: dev-panel
        image: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io/dev-panel:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3004
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: database-url
        - name: VITE_CONTROL_PLANE_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CONTROL_PLANE_URL
        - name: NODE_ENV
          value: "production"
        - name: VITE_AUTH_URL
          value: "https://studojo.com"
        livenessProbe:
          httpGet:
            path: /
            port: 3004
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3004
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: dev-panel
  namespace: studojo
spec:
  type: ClusterIP
  ports:
  - port: 3004
    targetPort: 3004
    protocol: TCP
    name: http
  selector:
    app: dev-panel

