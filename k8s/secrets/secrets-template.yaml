# IMPORTANT: This is a template. Replace all placeholder values with actual secrets.
# DO NOT commit actual secrets to version control.
# For production, use Azure Key Vault with CSI driver.

apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: studojo
type: Opaque
stringData:
  # Database
  database-url: "postgresql://studojo:PASSWORD@postgres.studojo.svc.cluster.local:5432/postgres"
  # For Azure Database for PostgreSQL, use:
  # database-url: "postgresql://studojo:PASSWORD@psql-studojo-prod.postgres.database.azure.com:5432/postgres?sslmode=require"
  postgres-password: "studojo"  # For dev only - use strong password in production
  
  # RabbitMQ
  rabbitmq-username: "studojo"  # Change to secure username
  rabbitmq-password: "YOUR_SECURE_RABBITMQ_PASSWORD"  # Generate a strong password
  rabbitmq-url: "amqp://studojo:YOUR_SECURE_RABBITMQ_PASSWORD@rabbitmq.studojo.svc.cluster.local:5672/"
  # For Azure Service Bus, replace with connection string
  
  # Control Plane
  jwks-url: "https://studojo.com/api/auth/jwks"
  razorpay-key-id: "rzp_test_yLageEyPxSrRxG"
  razorpay-key-secret: "pWKxbij31gPScaRELEhrHdvY"
  
  # Azure Storage
  azure-storage-account-name: "studojostorage"
  azure-storage-account-key: "YOUR_STORAGE_ACCOUNT_KEY"
  
  # Azure Communication Services
  azure-communication-connection-string: "endpoint=https://YOUR_COMMUNICATION_SERVICE.communication.azure.com/;accesskey=YOUR_ACCESS_KEY"
  
  # API Keys
  openai-api-key: "sk-YOUR_OPENAI_API_KEY"
  anthropic-api-key: "sk-ant-YOUR_ANTHROPIC_API_KEY"
  rephrasy-api-key: "YOUR_REPHRASY_API_KEY"
  
  # Frontend (if needed)
  better-auth-secret: "YOUR_BETTER_AUTH_SECRET"
  google-client-id: "YOUR_GOOGLE_CLIENT_ID"
  google-client-secret: "YOUR_GOOGLE_CLIENT_SECRET"
  twilio-account-sid: "YOUR_TWILIO_ACCOUNT_SID"
  twilio-auth-token: "YOUR_TWILIO_AUTH_TOKEN"
  twilio-verify-service-sid: "YOUR_TWILIO_VERIFY_SERVICE_SID"

  # InternReach / Job Outreach Service
  apollo-api-key: "YOUR_APOLLO_API_KEY"
  gmail-client-id: "YOUR_GMAIL_CLIENT_ID"
  gmail-client-secret: "YOUR_GMAIL_CLIENT_SECRET"
  azure-openai-key: "YOUR_AZURE_OPENAI_KEY"
  azure-openai-endpoint: "YOUR_AZURE_OPENAI_ENDPOINT"
  jwt-secret-key: "YOUR_JWT_SECRET_KEY"

---
# ACR Image Pull Secret (for pulling images from Azure Container Registry)
apiVersion: v1
kind: Secret
metadata:
  name: acr-secret
  namespace: studojo
type: kubernetes.io/dockerconfigjson
stringData:
  .dockerconfigjson: |
    {
      "auths": {
        "acrstudojo.azurecr.io": {
          "username": "acrstudojo",
          "password": "YOUR_ACR_PASSWORD",
          "email": "noreply@studojo.com"
        }
      }
    }
# To create this secret properly:
# kubectl create secret docker-registry acr-secret \
#   --docker-server=acrstudojo.azurecr.io \
#   --docker-username=acrstudojo \
#   --docker-password=$(az acr credential show --name acrstudojo --query "passwords[0].value" -o tsv) \
#   --namespace=studojo
