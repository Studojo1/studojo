apiVersion: v1
kind: ConfigMap
metadata:
  name: doc-files
  namespace: studojo
data:
  # This ConfigMap should be created from the doc/ directory
  # 
  # To create this ConfigMap, run from the project root:
  # kubectl create configmap doc-files --from-file=doc/ -n studojo --dry-run=client -o yaml > k8s/control-plane/doc-configmap.yaml
  #
  # Then apply it:
  # kubectl apply -f k8s/control-plane/doc-configmap.yaml
  #
  # Or create directly without saving:
  # kubectl create configmap doc-files --from-file=doc/ -n studojo
  #
  # Note: ConfigMaps have a 1MB size limit per key. If your doc files are large,
  # consider using a PersistentVolume or init container instead.
  #
  # After creating the ConfigMap, restart the control-plane pods:
  # kubectl rollout restart deployment/control-plane -n studojo

