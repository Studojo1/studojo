apiVersion: apps/v1
kind: Deployment
metadata:
  name: control-plane
  namespace: studojo
  labels:
    app: control-plane
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: control-plane
  template:
    metadata:
      labels:
        app: control-plane
        version: latest
      annotations:
        # Azure Monitor annotations for log collection
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: control-plane
      imagePullSecrets:
        - name: acr-secret
      initContainers:
        - name: wait-for-postgres
          image: postgres:16
          command:
            [
              "sh",
              "-c",
              'until pg_isready -h postgres.studojo.svc.cluster.local -U studojo; do echo "Waiting for PostgreSQL..."; sleep 2; done',
            ]
        - name: wait-for-rabbitmq
          image: rabbitmq:latest
          command:
            [
              "sh",
              "-c",
              'until rabbitmq-diagnostics -q ping 2>/dev/null || timeout 1 bash -c "</dev/tcp/rabbitmq.studojo.svc.cluster.local/5672" 2>/dev/null; do echo "Waiting for RabbitMQ..."; sleep 2; done',
            ]
      containers:
        - name: control-plane
          image: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io/control-plane:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: database-url
            - name: RABBITMQ_URL
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: rabbitmq-url
            - name: JWKS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: JWKS_URL
            - name: HTTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: HTTP_PORT
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CORS_ORIGINS
            - name: EMAILER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: EMAILER_SERVICE_URL
            - name: RAZORPAY_MODE
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: razorpay-mode
            - name: RAZORPAY_KEY_PROD_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: razorpay-key-prod-id
            - name: RAZORPAY_KEY_PROD_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: razorpay-key-prod-secret
            - name: RAZORPAY_KEY_TEST_ID
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: razorpay-key-test-id
            - name: RAZORPAY_KEY_TEST_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: razorpay-key-test-secret
            - name: AZURE_STORAGE_ACCOUNT_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: azure-storage-account-name
            - name: AZURE_STORAGE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
            - name: AZURE_STORAGE_ACCOUNT_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: azure-storage-account-key
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: github-token
            - name: KUBERNETES_NAMESPACE
              value: "studojo"
            - name: DEPLOYMENT_SECRET
              value: "d7a4d3b2-8c1e-4f5a-9b0c-1d2e3f4a5b6c"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: control-plane
  namespace: studojo
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: control-plane
