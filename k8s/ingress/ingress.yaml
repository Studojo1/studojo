# Ingress configuration for external access
# This uses the standard Kubernetes Ingress
# For Azure, you can also use Azure Application Gateway Ingress Controller (AGIC)

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: studojo-ingress
  namespace: studojo
  annotations:
    # For NGINX Ingress Controller
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # cert-manager for automatic TLS certificates
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Connection and timeout settings to handle network instability
    # Increased timeouts for long-running operations like PDF parsing
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "600"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    nginx.ingress.kubernetes.io/keepalive-timeout: "300"
    nginx.ingress.kubernetes.io/keepalive-requests: "10000"
    # Enable HTTP/2 for better connection reuse
    nginx.ingress.kubernetes.io/http2-push-preload: "true"
    # Increase buffer sizes for large requests
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffers-number: "8"
    # Retry on connection errors - automatic upstream retry
    nginx.ingress.kubernetes.io/proxy-next-upstream: "error timeout http_502 http_503 http_504"
    nginx.ingress.kubernetes.io/proxy-next-upstream-timeout: "0"
    nginx.ingress.kubernetes.io/proxy-next-upstream-tries: "3"
    # Increased keepalive connections for better connection stability
    nginx.ingress.kubernetes.io/upstream-keepalive-connections: "200"
    nginx.ingress.kubernetes.io/upstream-keepalive-timeout: "300"
    nginx.ingress.kubernetes.io/upstream-keepalive-requests: "10000"
spec:
  ingressClassName: nginx  # Change to "azure-application-gateway" if using AGIC
  tls:
  - hosts:
    - studojo.pro
    - www.studojo.pro
    - api.studojo.pro
    - studojo.com
    - www.studojo.com
    - api.studojo.com
    secretName: studojo-tls-secret  # Create this secret with your TLS cert, or use cert-manager
  - hosts:
    - admin.studojo.pro
    secretName: admin-studojo-pro-tls-secret  # Separate certificate for admin subdomain
  - hosts:
    - maverick.studojo.pro
    secretName: maverick-studojo-pro-tls-secret  # Certificate for maverick subdomain
  - hosts:
    - admin.studojo.com
    secretName: admin-studojo-com-tls-secret  # Certificate for admin .com subdomain
  - hosts:
    - maverick.studojo.com
    secretName: maverick-studojo-com-tls-secret  # Certificate for maverick .com subdomain
  - hosts:
    - partners.studojo.com
    secretName: partners-studojo-com-tls-secret  # Certificate for partner panel subdomain
  rules:
  # Frontend
  - host: studojo.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
  - host: www.studojo.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
  - host: studojo.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
  - host: www.studojo.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000
  - host: api.studojo.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: control-plane
            port:
              number: 8080
  # Control Plane API
  - host: api.studojo.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: control-plane
            port:
              number: 8080
  # Admin Panel
  - host: studojo.com
    http:
      paths:
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 3001
  - host: www.studojo.com
    http:
      paths:
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 3001
  - host: studojo.pro
    http:
      paths:
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 3001
  - host: www.studojo.pro
    http:
      paths:
      - path: /admin
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 3001
  # Admin Panel - Dedicated Subdomain
  - host: admin.studojo.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 3001
  # Maverick Blog Editor - Dedicated Subdomain
  - host: maverick.studojo.pro
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: maverick
            port:
              number: 3002
  # Admin Panel - Dedicated Subdomain (.com)
  - host: admin.studojo.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 3001
  # Maverick Blog Editor - Dedicated Subdomain (.com)
  - host: maverick.studojo.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: maverick
            port:
              number: 3002
  # Partner Panel - Dedicated Subdomain
  - host: partners.studojo.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: partner-panel
            port:
              number: 3003
