# Kubernetes Job to seed example resumes
# Run this after migrations are complete

apiVersion: batch/v1
kind: Job
metadata:
  name: frontend-seed-examples
  namespace: studojo
spec:
  template:
    spec:
      imagePullSecrets:
      - name: acr-secret
      initContainers:
      - name: wait-for-postgres
        image: postgres:16
        command: ['sh', '-c', 'until pg_isready -h postgres.studojo.svc.cluster.local -U studojo; do echo "Waiting for PostgreSQL..."; sleep 2; done']
      containers:
      - name: seed-examples
        image: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io/frontend:latest
        command: ["sh", "-c", "cd /src && npm run seed:examples"]
        workingDir: /src
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: database-url
        - name: RESUME_SERVICE_URL
          value: "http://resume-service.studojo.svc.cluster.local:8086"
        - name: USE_LOCALSTACK
          value: "false"
        - name: AZURE_STORAGE_ACCOUNT_NAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: azure-storage-account-name
        - name: AZURE_STORAGE_ACCOUNT_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: azure-storage-account-key
        - name: AZURE_STORAGE_CONTAINER_NAME
          value: "resumes"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
      restartPolicy: Never
  backoffLimit: 3

