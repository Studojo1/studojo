apiVersion: apps/v1
kind: Deployment
metadata:
  name: humanizer-svc
  namespace: studojo
  labels:
    app: humanizer-svc
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: humanizer-svc
  template:
    metadata:
      labels:
        app: humanizer-svc
    spec:
      imagePullSecrets:
      - name: acr-secret
      containers:
      - name: humanizer-svc
        image: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io/humanizer-svc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: REPHRASY_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: rephrasy-api-key
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: openai-api-key
        - name: HUMANIZER_MAX_PARAGRAPHS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: HUMANIZER_MAX_PARAGRAPHS
        - name: HUMANIZER_TIMEOUT_SECONDS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: HUMANIZER_TIMEOUT_SECONDS
        - name: AZURE_STORAGE_ACCOUNT_NAME
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: azure-storage-account-name
        - name: AZURE_STORAGE_ACCOUNT_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: azure-storage-account-key
        - name: AZURE_STORAGE_CONTAINER_NAME
          value: "humanizer"
        - name: PORT
          value: "8000"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: redis-url
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: redis-password
        - name: HUMANIZER_MAX_CONCURRENT_JOBS
          value: "5"
        - name: HUMANIZER_REQUEST_QUEUE_SIZE
          value: "20"
        - name: HUMANIZER_MAX_CONCURRENT_API_CALLS
          value: "5"
        - name: HUMANIZER_API_TIMEOUT
          value: "120"
        - name: HUMANIZER_MEMORY_LIMIT_MB
          value: "200"
        # Optional: Verification thresholds (defaults: min_similarity=0.6, max_length_ratio=2.0)
        - name: HUMANIZER_MIN_SIMILARITY
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: HUMANIZER_MIN_SIMILARITY
              optional: true
        - name: HUMANIZER_MAX_LENGTH_RATIO
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: HUMANIZER_MAX_LENGTH_RATIO
              optional: true
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "512Mi"  # Increased for parallel processing
            cpu: "200m"      # Increased for parallel processing
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: humanizer-svc
  namespace: studojo
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: humanizer-svc

