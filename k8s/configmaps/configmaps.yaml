apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: studojo
data:
  # Control Plane Config
  HTTP_PORT: "8080"
  CORS_ORIGINS: "https://studojo.com,https://www.studojo.com"
  
  # Frontend Config
  NODE_ENV: "production"
  BETTER_AUTH_URL: "https://studojo.com"
  
  # Resume Service Config
  PORT: "8086"
  
  # Assignment Gen Worker Config
  RESULTS_EXCHANGE: "cp.results"
  USE_LOCALSTACK: "false"
  AZURE_STORAGE_CONTAINER_NAME: "assignments"
  PYTHON_PATH: "python3"
  ASSIGNMENT_GEN_SCRIPT_PATH: "/app/assignment-gen/worker_generate.py"
  
  # Resume Worker Config
  RESULTS_EXCHANGE_RESUME: "cp.results"
  USE_LOCALSTACK_RESUME: "false"
  AZURE_STORAGE_CONTAINER_NAME_RESUME: "resumes"
  RESUME_SERVICE_URL: "http://resume-service:8086"
