apiVersion: apps/v1
kind: Deployment
metadata:
  name: job-outreach-svc
  namespace: studojo
  labels:
    app: job-outreach-svc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: job-outreach-svc
  template:
    metadata:
      labels:
        app: job-outreach-svc
    spec:
      containers:
      - name: job-outreach-svc
        image: acrstudojo-dhfsdrfhf6a6bbg2.azurecr.io/job-outreach-svc:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: job-outreach-config
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
