name: Dev Panel CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/dev-panel/**'
      - '.github/workflows/service-ci-cd.yml'
  tags:
    - 'v*.*.*'

jobs:
  build-and-deploy:
    uses: ./.github/workflows/service-ci-cd.yml@main
    with:
      service_name: dev-panel
      service_path: ./apps/dev-panel
      k8s_deployment_name: dev-panel
      k8s_container_name: dev-panel
      build_args: |
        VITE_CONTROL_PLANE_URL=${{ secrets.VITE_CONTROL_PLANE_URL || 'https://api.studojo.com' }}
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      KUBECONFIG: ${{ secrets.KUBECONFIG }}
      DEV_PANEL_WEBHOOK_URL: ${{ secrets.DEV_PANEL_WEBHOOK_URL }}

